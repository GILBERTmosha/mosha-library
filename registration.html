<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 9 MOCU - Usajili</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);padding:20px;min-height:100vh}
.container{max-width:1000px;margin:0 auto;background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.header{background:linear-gradient(135deg,#ff6b6b,#feca57);padding:25px;text-align:center;color:#fff}
.header h1{font-size:26px;margin-bottom:8px}
.back-btn{display:inline-block;margin-top:8px;padding:8px 16px;background:rgba(255,255,255,.3);color:#fff;text-decoration:none;border-radius:8px}
.content{padding:25px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:5px;font-weight:600;color:#374151}
.form-group input{width:100%;padding:11px;border:2px solid #e5e7eb;border-radius:8px;font-size:15px}
.form-group input:focus{outline:none;border-color:#667eea}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin:3px;transition:.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,.2)}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-success{background:#2ecc71;color:#fff}
.btn-warning{background:#f39c12;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.btn-admin{background:#34495e;color:#fff;width:100%;margin-top:20px}
.btn-camera{background:#9b59b6;color:#fff}
.btn-small{padding:5px 10px;font-size:12px}
.alert{padding:12px;border-radius:8px;margin-bottom:15px;display:none}
.alert.success{background:#d1fae5;color:#065f46;border:2px solid #10b981}
.alert.error{background:#fee2e2;color:#991b1b;border:2px solid #ef4444}
.alert.show{display:block;animation:slideDown.3s}
table{width:100%;border-collapse:collapse;margin-top:20px;font-size:14px}
th,td{padding:10px;text-align:left;border-bottom:1px solid #e5e7eb}
th{background:#f9fafb;font-weight:600;color:#374151}
tr:hover{background:#f9fafb}
.admin-col{display:none}
.admin-col.show{display:table-cell}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge.admin{background:#e74c3c;color:#fff;margin-left:8px}
.badge.signed{background:#10b981;color:#fff}
.badge.unsigned{background:#f59e0b;color:#fff}
.badge.finger{background:#8b5cf6;color:#fff}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex;animation:fadeIn.3s}
.modal-content{background:#fff;padding:20px;border-radius:15px;max-width:450px;width:90%;max-height:90vh;overflow-y:auto}
.signature-pad{border:3px solid #e5e7eb;border-radius:10px;margin:12px 0;cursor:crosshair;background:#fff;touch-action:none;width:100%}
.sign-section,.finger-section{background:#f0f9ff;padding:18px;border-radius:12px;border:2px dashed #3b82f6;margin-top:18px;display:none}
.sign-section.show,.finger-section.show{display:block;animation:slideDown.3s}
.finger-section{border-color:#8b5cf6;background:#faf5ff}
.camera-container{position:relative;width:100%;max-width:350px;margin:12px auto;border-radius:10px;overflow:hidden;background:#000}
#cameraVideo{width:100%;display:block}
.finger-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:180px;border:3px dashed #8b5cf6;border-radius:65px;pointer-events:none;animation:pulse 2s infinite}
.delete-modal.modal-content{text-align:center}
.delete-icon{width:70px;height:70px;background:#fee2e2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px}
.delete-icon i{font-size:35px;color:#dc2626}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-users"></i> Group 9 MOCU - Usajili</h1>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Nyumbani</a>
    </div>

    <div class="content">
        <div id="alertBox" class="alert"></div>

        <form id="regForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Jina Kamili *</label>
                <input type="text" id="fullName" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Reg Number *</label>
                <input type="text" id="regNumber" placeholder="CMS/2026/001" required>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Sajili</button>
        </form>

        <div id="signSection" class="sign-section">
            <h3 style="color:#1e40af;margin-bottom:10px"><i class="fas fa-signature"></i> Hatua 1: Weka Sahihi</h3>
            <canvas id="signaturePad" class="signature-pad" height="140"></canvas>
            <button class="btn btn-success" onclick="saveSignature()"><i class="fas fa-check"></i> Hifadhi</button>
            <button class="btn" style="background:#e5e7eb" onclick="clearSignature()"><i class="fas fa-eraser"></i> Futa</button>
            <button class="btn" style="background:#e5e7eb" onclick="skipSignature()"><i class="fas fa-forward"></i> Ruka</button>
        </div>

        <div id="fingerSection" class="finger-section">
            <h3 style="color:#6b21a8;margin-bottom:10px"><i class="fas fa-fingerprint"></i> Hatua 2: Fingerprint</h3>
            <div class="camera-container">
                <video id="cameraVideo" autoplay playsinline></video>
                <div class="finger-overlay"></div>
            </div>
            <p style="text-align:center;color:#6b7280;font-size:13px;margin:8px 0"><i class="fas fa-hand-point-up"></i> Weka kidole ndani ya mstari</p>
            <button class="btn btn-camera" onclick="captureFingerprint()"><i class="fas fa-camera"></i> Piga Picha</button>
            <button class="btn" style="background:#e5e7eb" onclick="skipFingerprint()"><i class="fas fa-forward"></i> Ruka</button>
            <button class="btn" style="background:#e5e7eb" onclick="stopCamera()"><i class="fas fa-stop"></i> Zima</button>
        </div>

        <h2 style="margin:25px 0 12px;color:#374151">
            <i class="fas fa-list"></i> Wanachama
            <span id="adminBadge" class="badge admin" style="display:none">ADMIN</span>
        </h2>

        <table>
            <thead>
                <tr><th>#</th><th>Jina</th><th>Email</th><th>Reg No.</th><th>Sahihi</th><th>Finger</th><th class="admin-col">Actions</th></tr>
            </thead>
            <tbody id="tableBody"><tr><td colspan="7" style="text-align:center;color:#6b7280">Inapakia...</td></tr></tbody>
        </table>

        <!-- BUTTON YA SIRI YA ADMIN - IKO HAPA CHINI YA JADA -->
        <button class="btn btn-admin" onclick="toggleAdmin()"><i class="fas fa-user-shield"></i> <span id="adminBtnText">Admin Mode</span></button>
        <p style="text-align:center;color:#9ca3af;font-size:11px;margin-top:8px"><i class="fas fa-lock"></i> Password: mosha@2026</p>
    </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:12px"><i class="fas fa-edit"></i> Hariri</h2>
        <form id="editForm">
            <input type="hidden" id="editId">
            <div class="form-group"><label>Jina Kamili *</label><input type="text" id="editName" required></div>
            <div class="form-group"><label>Email *</label><input type="email" id="editEmail" required></div>
            <div class="form-group"><label>Reg Number *</label><input type="text" id="editReg" required></div>
            <button type="submit" class="btn btn-success">Hifadhi</button>
            <button type="button" class="btn" style="background:#e5e7eb" onclick="closeEdit()">Ghairi</button>
        </form>
    </div>
</div>

<!-- Delete Modal -->
<div id="deleteModal" class="modal">
    <div class="modal-content" style="text-align:center">
        <div class="delete-icon"><i class="fas fa-trash-alt"></i></div>
        <h2 style="margin-bottom:8px;color:#1f2937">Una Uhakika?</h2>
        <p style="color:#6b7280;margin-bottom:18px">Unataka kumfuta <strong id="deleteName"></strong>?<br><small style="color:#dc2626">Hairudi nyuma!</small></p>
        <button class="btn btn-danger" onclick="confirmDelete()"><i class="fas fa-trash"></i> Ndio, Futa</button>
        <button class="btn" style="background:#e5e7eb" onclick="closeDelete()"><i class="fas fa-times"></i> Ghairi</button>
    </div>
</div>

<!-- Update Modal -->
<div id="updateModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom:12px" id="updateTitle"><i class="fas fa-sync-alt"></i> Badilisha</h2>
        <input type="hidden" id="updateId"><input type="hidden" id="updateType">
        <div id="updateSignSection" style="display:none">
            <canvas id="updateSignaturePad" class="signature-pad" height="140"></canvas>
            <button class="btn btn-success" onclick="saveUpdatedSignature()"><i class="fas fa-check"></i> Hifadhi</button>
            <button class="btn" style="background:#e5e7eb" onclick="clearUpdateSignature()"><i class="fas fa-eraser"></i> Futa</button>
        </div>
        <div id="updateFingerSection" style="display:none">
            <div class="camera-container"><video id="updateCameraVideo" autoplay playsinline></video><div class="finger-overlay"></div></div>
            <button class="btn btn-camera" onclick="captureUpdatedFingerprint()"><i class="fas fa-camera"></i> Piga Picha Mpya</button>
        </div>
        <button class="btn" style="background:#e5e7eb;width:100%;margin-top:12px" onclick="closeUpdate()"><i class="fas fa-times"></i> Ghairi</button>
    </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import{getFirestore,collection,addDoc,getDocs,updateDoc,deleteDoc,doc,orderBy,query}from'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyA8NHrfgAwHQGA9bVtEdGbEZ-TcFk9bVYs",authDomain:"chakula-2968b.firebaseapp.com",projectId:"chakula-2968b",storageBucket:"chakula-2968b.firebasestorage.app",messagingSenderId:"24927230556",appId:"1:24927230556:web:823dcfbe79885b022be499"};
const app=initializeApp(firebaseConfig),db=getFirestore(app),COLLECTION="group9_members",ADMIN_PASS="mosha@2026";
let isAdmin=!1,currentMemberId=null,deleteId=null,canvas,ctx,isDrawing=!1,updateCanvas,updateCtx,updateIsDrawing=!1,videoStream=null,updateVideoStream=null;

window.addEventListener('DOMContentLoaded',()=>{
canvas=document.getElementById('signaturePad');ctx=canvas.getContext('2d');ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.lineCap='round';resizeCanvas();
updateCanvas=document.getElementById('updateSignaturePad');updateCtx=updateCanvas.getContext('2d');updateCtx.strokeStyle='#000';updateCtx.lineWidth=2;updateCtx.lineCap='round';resizeUpdateCanvas();
canvas.addEventListener('mousedown',startDrawing);canvas.addEventListener('mousemove',draw);canvas.addEventListener('mouseup',stopDrawing);
canvas.addEventListener('touchstart',startDrawing);canvas.addEventListener('touchmove',draw);canvas.addEventListener('touchend',stopDrawing);
updateCanvas.addEventListener('mousedown',startUpdateDrawing);updateCanvas.addEventListener('mousemove',drawUpdate);updateCanvas.addEventListener('mouseup',stopUpdateDrawing);
updateCanvas.addEventListener('touchstart',startUpdateDrawing);updateCanvas.addEventListener('touchmove',drawUpdate);updateCanvas.addEventListener('touchend',stopUpdateDrawing);
window.addEventListener('resize',()=>{resizeCanvas();resizeUpdateCanvas()});loadMembers()});

function resizeCanvas(){const r=canvas.getBoundingClientRect();canvas.width=r.width;canvas.height=140}
function resizeUpdateCanvas(){const r=updateCanvas.getBoundingClientRect();updateCanvas.width=r.width;updateCanvas.height=140}
function startDrawing(e){isDrawing=!0;const r=canvas.getBoundingClientRect(),x=(e.clientX||e.touches[0].clientX)-r.left,y=(e.clientY||e.touches[0].clientY)-r.top;ctx.beginPath();ctx.moveTo(x,y)}
function draw(e){if(!isDrawing)return;e.preventDefault();const r=canvas.getBoundingClientRect(),x=(e.clientX||e.touches[0].clientX)-r.left,y=(e.clientY||e.touches[0].clientY)-r.top;ctx.lineTo(x,y);ctx.stroke()}
function stopDrawing(){isDrawing=!1}
window.clearSignature=()=>ctx.clearRect(0,0,canvas.width,canvas.height);
function startUpdateDrawing(e){updateIsDrawing=!0;const r=updateCanvas.getBoundingClientRect(),x=(e.clientX||e.touches[0].clientX)-r.left,y=(e.clientY||e.touches[0].clientY)-r.top;updateCtx.beginPath();updateCtx.moveTo(x,y)}
function drawUpdate(e){if(!updateIsDrawing)return;e.preventDefault();const r=updateCanvas.getBoundingClientRect(),x=(e.clientX||e.touches[0].clientX)-r.left,y=(e.clientY||e.touches[0].clientY)-r.top;updateCtx.lineTo(x,y);updateCtx.stroke()}
function stopUpdateDrawing(){updateIsDrawing=!1}
window.clearUpdateSignature=()=>updateCtx.clearRect(0,0,updateCanvas.width,updateCanvas.height);

window.saveSignature=async function(){
if(!currentMemberId)return;
const data=canvas.toDataURL();
try{await updateDoc(doc(db,COLLECTION,currentMemberId),{signature:data,signedAt:new Date().toISOString()});
showAlert('Sahihi imehifadhiwa! Sasa weka fingerprint','success');document.getElementById('signSection').classList.remove('show');clearSignature();showFingerprintSection()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
}
window.skipSignature=function(){document.getElementById('signSection').classList.remove('show');clearSignature();showFingerprintSection()}
function showFingerprintSection(){document.getElementById('fingerSection').classList.add('show');startCamera()}
async function startCamera(){try{videoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:640,height:480}});document.getElementById('cameraVideo').srcObject=videoStream}catch(e){showAlert('Kamera haijafunguka!','error')}}
window.captureFingerprint=async function(){
if(!currentMemberId||!videoStream)return showAlert('Kamera haijafunguka!','error');
const v=document.getElementById('cameraVideo'),c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);
const data=c.toDataURL('image/jpeg',0.8);
try{await updateDoc(doc(db,COLLECTION,currentMemberId),{fingerprint:data,fingerAt:new Date().toISOString()});
showAlert('Fingerprint imehifadhiwa!','success');document.getElementById('fingerSection').classList.remove('show');stopCamera();loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
}
window.skipFingerprint=function(){document.getElementById('fingerSection').classList.remove('show');stopCamera();currentMemberId=null}
window.stopCamera=function(){if(videoStream){videoStream.getTracks().forEach(t=>t.stop());videoStream=null}}

document.getElementById('regForm').addEventListener('submit',async e=>{
e.preventDefault();
try{const r=await addDoc(collection(db,COLLECTION),{name:document.getElementById('fullName').value,email:document.getElementById('email').value,regNumber:document.getElementById('regNumber').value,signature:null,signedAt:null,fingerprint:null,fingerAt:null,date:new Date().toISOString()});
currentMemberId=r.id;showAlert('Umesajiliwa! Weka sahihi sasa','success');e.target.reset();document.getElementById('signSection').classList.add('show');loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
});

async function loadMembers(){
const tb=document.getElementById('tableBody');tb.innerHTML='<tr><td colspan="7" style="text-align:center">Inapakia...</td></tr>';
try{const q=query(collection(db,COLLECTION),orderBy('date','desc')),s=await getDocs(q);
if(s.empty){tb.innerHTML='<tr><td colspan="7" style="text-align:center;color:#6b7280">Hakuna wanachama bado</td></tr>';return}
let h='',i=1;s.forEach(d=>{const m=d.data(),hs=m.signature!==null,hf=m.fingerprint!==null;
h+=`<tr><td>${i++}</td><td>${m.name}</td><td>${m.email}</td><td>${m.regNumber}</td>
<td><span class="badge ${hs?'signed':'unsigned'}">${hs?'✓':'✗'}</span><button class="btn btn-small" style="background:#3b82f6;color:#fff" onclick="updateSignature('${d.id}')"><i class="fas fa-sync"></i></button></td>
<td><span class="badge ${hf?'finger':'unsigned'}">${hf?'👆':'✗'}</span><button class="btn btn-small" style="background:#8b5cf6;color:#fff" onclick="updateFingerprint('${d.id}')"><i class="fas fa-sync"></i></button></td>
<td class="admin-col ${isAdmin?'show':''}">
<button class="btn btn-warning" onclick="editMember('${d.id}','${m.name}','${m.email}','${m.regNumber}')"><i class="fas fa-edit"></i></button>
<button class="btn btn-danger" onclick="showDeleteModal('${d.id}','${m.name}')"><i class="fas fa-trash"></i></button>
</td></tr>`});tb.innerHTML=h}catch(e){tb.innerHTML=`<tr><td colspan="7" style="color:#dc2626">Hitilafu: ${e.message}</td></tr>`}
}

// BADILISHA SAHIHI/FINGERPRINT KAMA MTU KAKOSEA - HAITAJI ADMIN
window.updateSignature=function(id){
currentMemberId=id;document.getElementById('updateId').value=id;document.getElementById('updateType').value='signature';
document.getElementById('updateTitle').innerHTML='<i class="fas fa-signature"></i> Badilisha Sahihi';
document.getElementById('updateSignSection').style.display='block';document.getElementById('updateFingerSection').style.display='none';
document.getElementById('updateModal').classList.add('active')}
window.updateFingerprint=function(id){
currentMemberId=id;document.getElementById('updateId').value=id;document.getElementById('updateType').value='fingerprint';
document.getElementById('updateTitle').innerHTML='<i class="fas fa-fingerprint"></i> Badilisha Fingerprint';
document.getElementById('updateSignSection').style.display='none';document.getElementById('updateFingerSection').style.display='block';
document.getElementById('updateModal').classList.add('active');startUpdateCamera()}
window.saveUpdatedSignature=async function(){
const id=document.getElementById('updateId').value,data=updateCanvas.toDataURL();
try{await updateDoc(doc(db,COLLECTION,id),{signature:data,signedAt:new Date().toISOString()});
showAlert('Sahihi imebadilishwa!','success');closeUpdate();loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
}
async function startUpdateCamera(){try{updateVideoStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:640,height:480}});document.getElementById('updateCameraVideo').srcObject=updateVideoStream}catch(e){showAlert('Kamera haijafunguka!','error')}}
window.captureUpdatedFingerprint=async function(){
const id=document.getElementById('updateId').value;if(!updateVideoStream)return showAlert('Kamera haijafunguka!','error');
const v=document.getElementById('updateCameraVideo'),c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);
const data=c.toDataURL('image/jpeg',0.8);
try{await updateDoc(doc(db,COLLECTION,id),{fingerprint:data,fingerAt:new Date().toISOString()});
showAlert('Fingerprint imebadilishwa!','success');stopUpdateCamera();closeUpdate();loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
}
window.stopUpdateCamera=function(){if(updateVideoStream){updateVideoStream.getTracks().forEach(t=>t.stop());updateVideoStream=null}}
window.closeUpdate=function(){document.getElementById('updateModal').classList.remove('active');stopUpdateCamera();clearUpdateSignature()}

// ADMIN MODE
window.toggleAdmin=function(){
if(!isAdmin){const p=prompt('Ingiza Password ya Admin:');
if(p===ADMIN_PASS){isAdmin=!0;document.getElementById('adminBtnText').textContent='Toka Admin';document.getElementById('adminBadge').style.display='inline-block';showAlert('Admin Mode Imewashwa!','success');loadMembers()}
else if(p!==null)showAlert('Password si sahihi!','error')}else{isAdmin=!1;document.getElementById('adminBtnText').textContent='Admin Mode';document.getElementById('adminBadge').style.display='none';loadMembers()}
}

window.editMember=function(id,n,e,r){document.getElementById('editId').value=id;document.getElementById('editName').value=n;document.getElementById('editEmail').value=e;document.getElementById('editReg').value=r;document.getElementById('editModal').classList.add('active')}
window.closeEdit=function(){document.getElementById('editModal').classList.remove('active')}
document.getElementById('editForm').addEventListener('submit',async e=>{
e.preventDefault();const id=document.getElementById('editId').value;
try{await updateDoc(doc(db,COLLECTION,id),{name:document.getElementById('editName').value,email:document.getElementById('editEmail').value,regNumber:document.getElementById('editReg').value});
showAlert('Mabadiliko yamehifadhiwa!','success');closeEdit();loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
});

window.showDeleteModal=function(id,n){deleteId=id;document.getElementById('deleteName').textContent=n;document.getElementById('deleteModal').classList.add('active')}
window.closeDelete=function(){document.getElementById('deleteModal').classList.remove('active');deleteId=null}
window.confirmDelete=async function(){
if(!deleteId)return;
try{await deleteDoc(doc(db,COLLECTION,deleteId));showAlert('Amefutwa kikamilifu!','success');closeDelete();loadMembers()}catch(e){showAlert('Hitilafu: '+e.message,'error')}
}

function showAlert(m,t){const b=document.getElementById('alertBox');b.className=`alert ${t} show`;b.innerHTML=`<i class="fas fa-${t==='success'?'check':'times'}-circle"></i> ${m}`;setTimeout(()=>b.classList.remove('show'),3000)}
loadMembers();
</script>

</body>
</html>
